services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-habit-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - appnet

  mongo:
    image: mongo:7
    container_name: ai-habit-mongo
    environment:
      TZ: Asia/Seoul
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - appnet

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: ai-habit-ai
    environment:
      TZ: Asia/Seoul
      # 예: FastAPI 내부에서 사용할 수 있게
      # PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - appnet

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ai-habit-api
    environment:
      TZ: Asia/Seoul

      # DB
      DATABASE_URL: postgresql://app:app@postgres:5432/app

      # Mongo
      MONGO_URL: mongodb://mongo:27017

      # AI service
      AI_BASE_URL: http://ai:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      ai:
        condition: service_started
    networks:
      - appnet

  demo:
    build:
      context: ./apps/demo
      dockerfile: Dockerfile
    container_name: ai-habit-demo
    environment:
      TZ: Asia/Seoul
      # Vite/React에서 API 주소를 환경변수로 받는다면:
      # VITE_API_BASE_URL: http://localhost:3000
      # (컨테이너 내부->외부 접근 이슈 피하려면, demo는 보통 브라우저에서 localhost로 호출)
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    networks:
      - appnet

networks:
  appnet:

volumes:
  postgres_data:
  mongo_data:
