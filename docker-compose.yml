services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-habit-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
      TZ: Asia/Seoul
    command: postgres -c timezone=Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - appnet

  mongo:
    image: mongo:7
    container_name: ai-habit-mongo
    environment:
      TZ: Asia/Seoul
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - appnet

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: ai-habit-ai
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Seoul
      LLM_MODEL: Qwen/Qwen2.5-1.5B-Instruct
      HF_HOME: /root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ai-habit-api
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: postgresql://app:app@postgres:5432/app
      MONGO_URL: mongodb://mongo:27017
      AI_BASE_URL: http://ai:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - appnet

  demo:
    build:
      context: ./apps/demo
      dockerfile: Dockerfile
    container_name: ai-habit-demo
    environment:
      TZ: Asia/Seoul
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - appnet

networks:
  appnet:

volumes:
  postgres_data:
  mongo_data:
  hf_cache:
