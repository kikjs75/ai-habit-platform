# AI Habit Platform — Load Test 설정

api:
  base_url: "http://localhost:3000"
  endpoint: "/records/ocr"
  user_id: "load-test"
  timeout: 120                 # 요청 타임아웃 (초)

load:
  mode: "sequential"           # sequential: 응답 받은 후 다음 요청
                               # concurrent: TPS 기반 동시 요청 (OCR only 권장)

  # sequential 종료 조건 (둘 중 하나만 사용, duration_sec 우선)
  max_requests: 20             # 건수 기준 종료
  # duration_sec: 300          # 시간 기준 종료 (초) — 주석 해제 시 max_requests 대신 사용

  # 요청 간 대기 시간 (delay_min/max 둘 다 설정 시 랜덤, 아니면 delay_sec 고정)
  delay_sec: 2                 # 고정 대기 시간 (초)
  # delay_min: 1               # 랜덤 대기 최솟값 (초)
  # delay_max: 10              # 랜덤 대기 최댓값 (초)

  # concurrent 모드 전용
  tps: 0.03                    # 초당 요청 수 (LLM 한계: ~0.033)
  duration: 300                # 테스트 실행 시간 (초)
  max_workers: 4               # 최대 동시 스레드 수
  max_pending: 2               # 최대 대기 요청 수

images:
  output_dir: "apps/ai/samples/images"
  delete_after_send: true
  width: 420
  height: 320

report:
  output_dir: "scripts/load_test/reports"

log:
  file: "scripts/load_test/logs/load_test.log"
  level: "INFO"
  rotate_mb: 100                # 100MB 초과 시 즉시 로테이션 (+ 자정 일별 로테이션)
