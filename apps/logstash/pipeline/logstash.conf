input {
  beats {
    port => 5044
  }
}

filter {
  # JSON 형식이 아닌 이벤트 드롭
  # (ELK 컴포넌트 자체 WARN 로그, 기타 컨테이너 로그 포함)
  # 파싱 시도 전에 드롭해야 WARN 로그가 생성되지 않아 재귀 루프 방지
  if [message] !~ /^\s*\{/ {
    drop {}
  }

  # message 필드의 JSON 파싱
  json {
    source => "message"
  }

  # JSON 파싱 실패 이벤트 드롭
  if "_jsonparsefailure" in [tags] {
    drop {}
  }

  # ELK 컴포넌트 자체 로그 드롭 (ECS 포맷 — service.name 필드 존재)
  if [service][name] {
    drop {}
  }
}

output {
  if [service] == "nestjs-api" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ai-habit-api-logs-%{+yyyy.MM.dd}"
    }
  } else if [service] == "fastapi-ai" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ai-habit-ai-logs-%{+yyyy.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ai-habit-other-logs-%{+yyyy.MM.dd}"
    }
  }
}
